<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CIFAB — Valuation & Investment Model · SPV Ring-Fenced" />
    <title>CIFAB - Sumário Executivo</title>
    <script>
      // Resolve theme before React mounts to avoid FOUC
      (function () {
        try {
          var stored = localStorage.getItem("cifab-theme");
          var prefersLight =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches;
          var mode =
            stored === "light" || stored === "dark"
              ? stored
              : prefersLight
                ? "light"
                : "dark";
          document.documentElement.dataset.theme = mode;
          document.documentElement.style.background =
            mode === "dark" ? "#060E1A" : "#F5F7FA";
        } catch (e) {
          document.documentElement.style.background = "#060E1A";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
